<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Netlify Forms</title></head>
  <body>
    <!-- Hidden form for Netlify form detection at build time -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="text" name="business" />
      <select name="industry">
        <option value="AC service">AC service</option>
        <option value="Typing center">Typing center</option>
        <option value="Plumber">Plumber</option>
        <option value="Mover / packer">Mover / packer</option>
        <option value="Home kitchen">Home kitchen</option>
        <option value="Cake artist">Cake artist</option>
        <option value="Pool maintenance">Pool maintenance</option>
        <option value="Restaurant">Restaurant</option>
        <option value="Other">Other</option>
      </select>
      <input type="url" name="website" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
